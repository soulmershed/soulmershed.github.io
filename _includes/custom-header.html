<header class="site-header custom-header" role="banner">
  <div class="wrapper header-wrapper">

    <a class="site-logo" href="{{ "/" | relative_url }}" aria-label="Home">
      <!-- Replace the text below later with an <img src="..."> -->
      <span class="logo-text">LOGO</span>
    </a>

    <nav class="site-nav custom-nav">
      {% for page_path in site.header_pages %}
        {% assign my_page = site.pages | where: "path", page_path | first %}
        {% if my_page.title %}
          <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
