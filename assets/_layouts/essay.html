---
layout: default
---

<article class="essay-reader-page theme-white font-ebgaramond spacing-medium text-black{% if page.essay %} essay-post{% endif %}">

<button
  class="reader-settings-toggle"
    id="readerToggle"
      type="button"
        aria-expanded="false"
          aria-controls="readerPanel"
            aria-label="Open reader settings"
            >
            Aa
            </button>

            <aside class="reader-settings-panel" id="readerPanel" hidden>
              <div class="reader-settings-inner">

                  <h2>Reader settings</h2>

                      <div class="reader-control">
                            <label for="pageTheme">Page color</label>
                                  <select id="pageTheme">
                                          <option value="white">White</option>
                                                  <option value="cream">Cream</option>
                                                          <option value="darkblue">Dark blue</option>
                                                                  <option value="black">Black</option>
                                                                        </select>
                                                                            </div>

                                                                                <div class="reader-control">
                                                                                      <label for="fontFamily">Font type</label>
                                                                                            <select id="fontFamily">
                                                                                                    <option value="ebgaramond">EB Garamond</option>
                                                                                                            <option value="times">Times New Roman</option>
                                                                                                                    <option value="georgia">Georgia</option>
                                                                                                                          </select>
                                                                                                                              </div>

                                                                                                                                  <div class="reader-control">
                                                                                                                                        <label for="fontSize">Font size</label>
                                                                                                                                              <input id="fontSize" type="range" min="16" max="28" step="1" value="21">
                                                                                                                                                    <span class="reader-note" id="fontSizeValue">21 px</span>
                                                                                                                                                        </div>

                                                                                                                                                            <div class="reader-control">
                                                                                                                                                                  <label for="fontColor">Font color</label>
                                                                                                                                                                        <select id="fontColor">
                                                                                                                                                                                <option value="auto">Automatic</option>
                                                                                                                                                                                        <option value="black">Black</option>
                                                                                                                                                                                                <option value="darkgray">Dark gray</option>
                                                                                                                                                                                                        <option value="white">White</option>
                                                                                                                                                                                                                <option value="creamtext">Cream</option>
                                                                                                                                                                                                                      </select>
                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                              <div class="reader-control">
                                                                                                                                                                                                                                    <label for="lineSpacing">Line spacing</label>
                                                                                                                                                                                                                                          <select id="lineSpacing">
                                                                                                                                                                                                                                                  <option value="narrow">Narrow</option>
                                                                                                                                                                                                                                                          <option value="medium">Medium</option>
                                                                                                                                                                                                                                                                  <option value="wide">Wide</option>
                                                                                                                                                                                                                                                                        </select>
                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                              </aside>


                                                                                                                                                                                                                                                                              <div class="essay-reader-shell">

                                                                                                                                                                                                                                                                              <header
                                                                                                                                                                                                                                                                                class="essay-reader-header"
                                                                                                                                                                                                                                                                                  style="margin-top: {{ page.title_gap | default: '200px' }};"
                                                                                                                                                                                                                                                                                  >

                                                                                                                                                                                                                                                                                  <h1 class="essay-reader-title">
                                                                                                                                                                                                                                                                                  {{ page.title }}
                                                                                                                                                                                                                                                                                  </h1>

                                                                                                                                                                                                                                                                                  {% if page.subtitle %}
                                                                                                                                                                                                                                                                                  <p class="essay-reader-subtitle">
                                                                                                                                                                                                                                                                                  {{ page.subtitle }}
                                                                                                                                                                                                                                                                                  </p>
                                                                                                                                                                                                                                                                                  {% endif %}

                                                                                                                                                                                                                                                                                  {% if page.date %}
                                                                                                                                                                                                                                                                                  <p
                                                                                                                                                                                                                                                                                    class="essay-reader-meta"
                                                                                                                                                                                                                                                                                      style="font-size: {{ page.date_size | default: '18px' }};"
                                                                                                                                                                                                                                                                                      >
                                                                                                                                                                                                                                                                                      <time datetime="{{ page.date | date_to_xmlschema }}">
                                                                                                                                                                                                                                                                                      {{ page.date | date: "%b %-d, %Y" }}
                                                                                                                                                                                                                                                                                      </time>
                                                                                                                                                                                                                                                                                      </p>
                                                                                                                                                                                                                                                                                      {% endif %}

                                                                                                                                                                                                                                                                                      {% if page.abstract %}
                                                                                                                                                                                                                                                                                      <div class="essay-reader-abstract">
                                                                                                                                                                                                                                                                                      <p>{{ page.abstract }}</p>
                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                      {% endif %}

                                                                                                                                                                                                                                                                                      {% if page.epigraph %}
                                                                                                                                                                                                                                                                                      <figure class="essay-reader-epigraph">

                                                                                                                                                                                                                                                                                      <blockquote>
                                                                                                                                                                                                                                                                                      <p>{{ page.epigraph }}</p>
                                                                                                                                                                                                                                                                                      </blockquote>

                                                                                                                                                                                                                                                                                      {% if page.epigraph_source %}
                                                                                                                                                                                                                                                                                      <figcaption>{{ page.epigraph_source }}</figcaption>
                                                                                                                                                                                                                                                                                      {% endif %}

                                                                                                                                                                                                                                                                                      </figure>
                                                                                                                                                                                                                                                                                      {% endif %}

                                                                                                                                                                                                                                                                                      </header>


                                                                                                                                                                                                                                                                                      <section class="essay-reader-content" aria-label="Essay content">
                                                                                                                                                                                                                                                                                      {{ content }}
                                                                                                                                                                                                                                                                                      </section>

                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                      </article>


                                                                                                                                                                                                                                                                                      <script>
                                                                                                                                                                                                                                                                                      window.MathJax = {
                                                                                                                                                                                                                                                                                      tex: {
                                                                                                                                                                                                                                                                                      inlineMath: [['\\(','\\)']],
                                                                                                                                                                                                                                                                                      displayMath: [['$$','$$'],['\\[','\\]']],
                                                                                                                                                                                                                                                                                      processEscapes: true,
                                                                                                                                                                                                                                                                                      packages: {'[+]':['noerrors']}
                                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                                      chtml: {
                                                                                                                                                                                                                                                                                      scale: 1.0,
                                                                                                                                                                                                                                                                                      displayAlign: 'center',
                                                                                                                                                                                                                                                                                      displayIndent: '0'
                                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                                      options:{
                                                                                                                                                                                                                                                                                      skipHtmlTags:['script','noscript','style','textarea','pre','code']
                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                      };
                                                                                                                                                                                                                                                                                      </script>

                                                                                                                                                                                                                                                                                      <script async
                                                                                                                                                                                                                                                                                      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
                                                                                                                                                                                                                                                                                      </script>

                                                                                                                                                                                                                                                                                      <script src="{{ '/assets/js/reader-settings.js' | relative_url }}"></script>
